<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>MiniGPT receipt contract summary check</title>
<style>
:root { font-family: Segoe UI, Arial, sans-serif; background: #f5f7f8; color: #172029; }
body { margin: 0; padding: 28px; }
main { max-width: 1040px; margin: 0 auto; }
section { background: #fff; border: 1px solid #d7dee3; border-radius: 8px; padding: 16px; margin: 0 0 16px; }
h1 { font-size: 28px; margin: 0 0 12px; letter-spacing: 0; }
h2 { font-size: 18px; margin: 0 0 10px; letter-spacing: 0; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
.metric { border: 1px solid #d7dee3; border-radius: 8px; padding: 10px; background: #fbfcfd; }
.metric span { display: block; color: #5a6871; font-size: 12px; }
.metric strong { display: block; margin-top: 6px; overflow-wrap: anywhere; }
li { margin: 6px 0; }
</style>
</head>
<body>
<main>
<h1>MiniGPT receipt contract summary check</h1>
<section>
<h2>Check</h2>
<div class="grid">
<div class="metric"><span>Status</span><strong>pass</strong></div>
<div class="metric"><span>Decision</span><strong>continue</strong></div>
<div class="metric"><span>Actual</span><strong>pass</strong></div>
<div class="metric"><span>Expected</span><strong>pass</strong></div>
<div class="metric"><span>Sidecar</span><strong>pass</strong></div>
<div class="metric"><span>Issues</span><strong>0</strong></div>
</div>
</section>
<section>
<h2>Sidecars</h2>
<ul>
<li>Text exists: True</li>
<li>Markdown exists: True</li>
<li>HTML exists: True</li>
</ul>
</section>
<section>
<h2>Issues</h2>
<ul>
<li>none</li>
</ul>
</section>
</main>
</body>
</html>
